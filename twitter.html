<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تحت الصيانة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Cairo', sans-serif;
      background-color: #f4f6f9;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
    }

    .container {
      padding: 2rem;
      background-color: #fff;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
    }

    .icon {
      font-size: 6rem;
      color: #ff6f61;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2rem;
      color: #2c3e50;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 1.2rem;
      color: #555;
      margin-bottom: 1.5rem;
    }

    .return-btn {
      display: inline-block;
      background-color: #007bff;
      color: #fff;
      padding: 0.8rem 2rem;
      border-radius: 30px;
      font-size: 1rem;
      text-decoration: none;
      transition: background-color 0.3s ease;
    }

    .return-btn:hover {
      background-color: #0056b3;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9rem;
      color: #aaa;
    }

    @media (max-width: 600px) {
      .icon {
        font-size: 4rem;
      }

      h1 {
        font-size: 1.6rem;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="icon">🚧</div>
    <h1>نحن في طور التحديث</h1>
    <p>نعتذر عن الإزعاج، الصفحة قيد الصيانة حاليًا. سنكون جاهزين قريبًا.</p>
    <a href="index.html" class="return-btn">العودة إلى الصفحة الرئيسية</a>
  </div>

  <div class="footer">
    &copy; 2025 جميع الحقوق محفوظة - Boost Followers
  </div>

</body>
</html>
